<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sanban</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  @font-face {
    font-family: 'Geist';
    src: url('https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/Geist-Regular.woff2') format('woff2');
    font-weight: 400; font-display: swap;
  }
  @font-face {
    font-family: 'Geist';
    src: url('https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/Geist-Medium.woff2') format('woff2');
    font-weight: 500; font-display: swap;
  }
  @font-face {
    font-family: 'Geist';
    src: url('https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/Geist-SemiBold.woff2') format('woff2');
    font-weight: 600; font-display: swap;
  }
  @font-face {
    font-family: 'Geist Mono';
    src: url('https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-mono/GeistMono-Regular.woff2') format('woff2');
    font-weight: 400; font-display: swap;
  }
  @font-face {
    font-family: 'Geist Mono';
    src: url('https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-mono/GeistMono-Medium.woff2') format('woff2');
    font-weight: 500; font-display: swap;
  }

  :root {
    --bg-0: #09090b;
    --bg-1: #111113;
    --bg-2: #18181b;
    --bg-3: #1e1e22;
    --border: #27272a;
    --border-hover: #3f3f46;
    --text-0: #fafafa;
    --text-1: #a1a1aa;
    --text-2: #71717a;
    --accent: #3b82f6;
    --accent-dim: #172554;
    --green: #22c55e;
    --green-dim: #052e16;
    --yellow: #eab308;
    --yellow-dim: #422006;
    --red: #ef4444;
    --red-dim: #450a0a;
    --purple: #a855f7;
    --purple-dim: #3b0764;
    --orange: #f97316;
    --orange-dim: #431407;
    --cyan: #06b6d4;
    --cyan-dim: #083344;
    --radius: 6px;
    --font-mono: 'Geist Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    --font-sans: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  html { font-size: 16px; }
  body {
    font-family: var(--font-sans);
    background: var(--bg-0);
    color: var(--text-0);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .header {
    position: sticky; top: 0; z-index: 40;
    background: var(--bg-0); border-bottom: 1px solid var(--border);
    padding: 12px 24px;
  }
  .header-top { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .header h1 {
    font-size: 1rem; font-weight: 600; letter-spacing: -0.02em;
    display: flex; align-items: center; gap: 8px;
    color: var(--text-0);
  }

  /* ── Board Picker ── */
  .board-picker {
    font-family: var(--font-mono); font-size: 0.85rem;
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text-0);
    padding: 5px 10px; cursor: pointer; outline: none;
    transition: border-color 0.15s;
  }
  .board-picker:focus { border-color: var(--accent); }

  /* ── Buttons ── */
  .btn {
    font-family: var(--font-mono); font-size: 0.8rem;
    padding: 5px 12px; border-radius: 4px;
    border: 1px solid var(--border); background: var(--bg-2);
    color: var(--text-1); cursor: pointer; transition: all 0.12s;
    user-select: none;
  }
  .btn:hover { border-color: var(--border-hover); color: var(--text-0); }
  .btn:active { transform: scale(0.97); }
  .btn-accent { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .btn-accent:hover { background: var(--accent); color: var(--bg-0); }
  .btn-danger { background: var(--red-dim); border-color: var(--red); color: var(--red); }
  .btn-danger:hover { background: var(--red); color: var(--bg-0); }

  /* ── Stats ── */
  .stats {
    display: flex; gap: 16px; font-family: var(--font-mono);
    font-size: 0.8rem; color: var(--text-2); margin-left: auto;
  }
  .stats .num { color: var(--text-0); font-weight: 500; }
  .stats .pct { color: var(--green); }

  /* ── Filters ── */
  .filters { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; align-items: center; }
  .filter-group { display: flex; gap: 4px; align-items: center; }
  .filter-group::after {
    content: ''; width: 1px; height: 16px;
    background: var(--border); margin-left: 8px;
  }
  .filter-group:last-child::after { display: none; }
  .filter-label {
    font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-2); margin-right: 4px; font-family: var(--font-mono);
  }
  .chip {
    font-family: var(--font-mono); font-size: 0.75rem;
    padding: 3px 8px; border-radius: 3px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-2); cursor: pointer; transition: all 0.12s; user-select: none;
  }
  .chip:hover { border-color: var(--border-hover); color: var(--text-1); }
  .chip:active { transform: scale(0.95); }
  .chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  /* ── Search ── */
  .search-wrap { position: relative; margin-left: auto; }
  .search-wrap input {
    font-family: var(--font-mono); font-size: 0.8rem;
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text-0);
    padding: 4px 10px 4px 22px; width: 180px; outline: none; transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text-2); }
  .search-wrap::before {
    content: '/'; position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
    font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-2);
  }

  /* ── Board ── */
  .board {
    display: grid; gap: 1px; background: var(--border);
    min-height: calc(100dvh - 110px);
  }
  .column { background: var(--bg-1); display: flex; flex-direction: column; }
  .column-header {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg-1); border-bottom: 1px solid var(--border);
    padding: 10px 16px; display: flex; align-items: center; justify-content: space-between;
  }
  .column-title {
    font-family: var(--font-mono); font-size: 0.8rem; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-2); display: flex; align-items: center; gap: 8px;
  }
  .column-count {
    font-size: 0.7rem; background: var(--bg-3); padding: 2px 6px;
    border-radius: 3px; color: var(--text-2);
  }

  .card-list {
    flex: 1; padding: 8px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 4px; min-height: 120px;
  }
  .card-list.drag-over { background: var(--bg-2); }

  /* ── Cards ── */
  .card {
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 12px;
    cursor: grab; transition: border-color 0.12s, transform 0.1s; user-select: none;
    position: relative;
  }
  .card:hover { border-color: var(--border-hover); }
  .card:active { cursor: grabbing; transform: scale(0.98); }
  .card.dragging { opacity: 0.3; }
  .card.hidden { display: none; }

  .card-id {
    font-family: var(--font-mono); font-size: 0.75rem; font-weight: 500;
    color: var(--accent); margin-bottom: 2px;
  }
  .card-title { font-size: 0.9rem; color: var(--text-0); line-height: 1.4; margin-bottom: 6px; }
  .card-meta { display: flex; gap: 4px; flex-wrap: wrap; }
  .card-check {
    position: absolute; top: 6px; right: 6px;
    width: 14px; height: 14px; border-radius: 50%;
    border: 1px solid var(--border-hover); background: transparent;
    cursor: pointer; transition: all 0.15s; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0; color: transparent; padding: 0;
  }
  .card-check:hover { border-color: var(--green); background: var(--green-dim); }
  .card.done .card-check {
    border-color: var(--green); background: var(--green); color: var(--bg-0); font-size: 0.55rem;
  }
  .badge {
    font-family: var(--font-mono); font-size: 0.68rem;
    padding: 2px 5px; border-radius: 2px; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .badge-tag { background: var(--bg-3); color: var(--text-2); }
  .badge-pri-critical { background: var(--red-dim); color: var(--red); }
  .badge-pri-high { background: var(--orange-dim); color: var(--orange); }
  .badge-pri-medium { background: var(--yellow-dim); color: var(--yellow); }
  .badge-pri-low { background: var(--cyan-dim); color: var(--cyan); }
  .badge-effort-xs { background: var(--cyan-dim); color: var(--cyan); }
  .badge-effort-s { background: var(--accent-dim); color: var(--accent); }
  .badge-effort-m { background: var(--purple-dim); color: var(--purple); }
  .badge-effort-l { background: var(--orange-dim); color: var(--orange); }
  .badge-effort-xl { background: var(--red-dim); color: var(--red); }
  .badge-due { background: var(--yellow-dim); color: var(--yellow); }
  .badge-due.overdue { background: var(--red-dim); color: var(--red); }
  .badge-assignee { background: var(--green-dim); color: var(--green); }

  .card-detail {
    display: none; margin-top: 8px; padding-top: 8px;
    border-top: 1px solid var(--border); font-size: 0.82rem; line-height: 1.5;
  }
  .card.expanded .card-detail { display: block; }
  .detail-section { margin-bottom: 6px; }
  .detail-label {
    font-family: var(--font-mono); font-size: 0.7rem; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--text-2); margin-bottom: 2px;
  }
  .detail-text { color: var(--text-1); white-space: pre-wrap; word-break: break-word; }

  /* ── Markdown rendered content ── */
  .md-content strong { color: var(--text-0); font-weight: 600; }
  .md-content em { font-style: italic; color: var(--text-1); }
  .md-content code {
    font-family: var(--font-mono); font-size: 0.85em;
    background: var(--bg-3); padding: 1px 5px; border-radius: 3px; color: var(--accent);
  }
  .md-content pre {
    background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 10px 12px; margin: 6px 0; overflow-x: auto;
  }
  .md-content pre code {
    background: none; padding: 0; border-radius: 0; color: var(--text-0);
    font-size: 0.82rem; line-height: 1.5; white-space: pre;
  }
  .md-content .kw { color: var(--purple); }
  .md-content .str { color: var(--green); }
  .md-content .cmt { color: var(--text-2); font-style: italic; }
  .md-content .fn { color: var(--accent); }
  .md-content .num { color: var(--orange); }
  .md-content .dec { color: var(--yellow); }
  .md-content a { color: var(--accent); text-decoration: none; }
  .md-content a:hover { text-decoration: underline; }
  .md-content ul, .md-content ol {
    margin: 5px 0; padding-left: 18px;
  }
  .md-content li { margin: 3px 0; }
  .md-content p { margin: 5px 0; }
  .md-content h1, .md-content h2, .md-content h3 {
    font-size: 0.9rem; font-weight: 600; color: var(--text-0);
    margin: 8px 0 3px;
  }

  /* ── Card Actions ── */
  .card-actions {
    display: none; gap: 4px; margin-top: 6px;
  }
  .card:hover .card-actions { display: flex; }
  .card-btn {
    font-family: var(--font-mono); font-size: 0.68rem;
    padding: 2px 6px; border-radius: 3px;
    border: 1px solid var(--border); background: var(--bg-3);
    color: var(--text-2); cursor: pointer; transition: all 0.12s;
  }
  .card-btn:hover { border-color: var(--border-hover); color: var(--text-1); }
  .card-btn-edit:hover { color: var(--accent); border-color: var(--accent); }
  .card-btn-delete:hover { color: var(--red); border-color: var(--red); }

  /* ── Empty state ── */
  .empty {
    display: flex; align-items: center; justify-content: center; flex: 1;
    color: var(--text-2); font-size: 0.8rem; font-family: var(--font-mono); padding: 36px 0;
  }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65);
    display: none; align-items: center; justify-content: center; z-index: 100;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-1); border: 1px solid var(--border); border-radius: 8px;
    width: 480px; max-width: 95vw; max-height: 85vh; overflow-y: auto; padding: 22px;
  }
  .modal h2 {
    font-size: 1rem; font-weight: 600; margin-bottom: 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal label {
    display: block; font-family: var(--font-mono); font-size: 0.72rem;
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2);
    margin-bottom: 4px; margin-top: 12px;
  }
  .modal input, .modal select, .modal textarea {
    width: 100%; font-family: var(--font-mono); font-size: 0.85rem;
    background: var(--bg-2); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-0); padding: 6px 8px; outline: none; transition: border-color 0.15s;
  }
  .modal input:focus, .modal select:focus, .modal textarea:focus { border-color: var(--accent); }
  .modal textarea { resize: vertical; min-height: 60px; font-family: var(--font-sans); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--bg-3); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 8px 14px; font-family: var(--font-mono); font-size: 0.8rem;
    color: var(--text-0); opacity: 0; transform: translateY(6px);
    transition: all 0.15s ease; z-index: 100; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── Shortcuts ── */
  .shortcuts {
    position: fixed; bottom: 20px; left: 20px;
    font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-2); opacity: 0.4;
  }
  .shortcuts kbd {
    background: var(--bg-3); padding: 1px 4px; border-radius: 2px;
    border: 1px solid var(--border); font-family: var(--font-mono);
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

  /* ── Welcome Screen ── */
  .welcome {
    position: fixed; inset: 0; z-index: 50;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-0);
    opacity: 0; animation: fadeIn 0.4s ease 0.1s forwards;
  }
  .welcome.hidden { display: none; }
  .welcome-card {
    width: 440px; max-width: 92vw;
    background: var(--bg-1); border: 1px solid var(--border); border-radius: 10px;
    padding: 40px 36px 36px;
    opacity: 0; transform: translateY(12px);
    animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.25s forwards;
  }
  .welcome-logo {
    font-size: 1.6rem; font-weight: 600; letter-spacing: -0.03em;
    color: var(--text-0); margin-bottom: 6px;
  }
  .welcome-sub {
    font-size: 0.9rem; color: var(--text-2); line-height: 1.5; margin-bottom: 32px;
  }
  .welcome-form { display: flex; flex-direction: column; gap: 16px; }
  .welcome-field label {
    display: block; font-family: var(--font-mono); font-size: 0.72rem;
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2);
    margin-bottom: 5px;
  }
  .welcome-field input {
    width: 100%; font-family: var(--font-mono); font-size: 0.9rem;
    background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text-0); padding: 10px 12px; outline: none; transition: border-color 0.15s;
  }
  .welcome-field input:focus { border-color: var(--accent); }
  .welcome-field input::placeholder { color: var(--text-2); }
  .welcome-create {
    width: 100%; padding: 11px 18px; border-radius: var(--radius);
    font-family: var(--font-mono); font-size: 0.9rem; font-weight: 500;
    background: var(--accent); color: var(--bg-0); border: none;
    cursor: pointer; transition: opacity 0.12s, transform 0.1s;
    margin-top: 4px;
  }
  .welcome-create:hover { opacity: 0.9; }
  .welcome-create:active { transform: scale(0.98); }
  .welcome-create:disabled { opacity: 0.4; cursor: not-allowed; }
  .welcome-shortcuts {
    margin-top: 26px; padding-top: 18px; border-top: 1px solid var(--border);
    font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-2);
    display: flex; gap: 14px; flex-wrap: wrap;
  }
  .welcome-shortcuts kbd {
    background: var(--bg-3); padding: 1px 5px; border-radius: 2px;
    border: 1px solid var(--border); font-family: var(--font-mono);
    font-size: 0.7rem;
  }

  /* ── Board Create Modal ── */
  .board-modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65);
    display: none; align-items: center; justify-content: center; z-index: 100;
  }
  .board-modal-overlay.open { display: flex; }
  .board-modal {
    background: var(--bg-1); border: 1px solid var(--border); border-radius: 8px;
    width: 420px; max-width: 95vw; padding: 22px;
    opacity: 0; transform: translateY(8px);
    animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .board-modal h2 {
    font-size: 1rem; font-weight: 600; margin-bottom: 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .board-modal label {
    display: block; font-family: var(--font-mono); font-size: 0.72rem;
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2);
    margin-bottom: 4px; margin-top: 12px;
  }
  .board-modal input {
    width: 100%; font-family: var(--font-mono); font-size: 0.85rem;
    background: var(--bg-2); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-0); padding: 6px 8px; outline: none; transition: border-color 0.15s;
  }
  .board-modal input:focus { border-color: var(--accent); }
  .board-modal input::placeholder { color: var(--text-2); }
  .board-modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

  /* ── Reduced motion ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; animation: none !important; }
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .board { grid-template-columns: 1fr !important; }
    .header { padding: 8px 12px; }
    .search-wrap input { width: 120px; }
    .welcome-card { padding: 28px 24px 24px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>sanban</h1>
    <select class="board-picker" id="board-picker"></select>
    <button class="btn btn-accent" id="btn-new" title="New item (n)">+ item</button>
    <button class="btn" id="btn-new-board" title="New board">+ board</button>
    <button class="btn btn-danger" id="btn-delete-board" title="Delete current board">delete board</button>
    <button class="btn" id="btn-refresh" title="Refresh board (r)">&#x21bb;</button>
    <div class="stats" id="stats"></div>
  </div>
  <div class="filters" id="filters">
    <div class="filter-group" data-filter="priority">
      <span class="filter-label">Pri</span>
    </div>
    <div class="filter-group" data-filter="effort">
      <span class="filter-label">Effort</span>
    </div>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="search..." />
    </div>
  </div>
</div>

<div class="board" id="board"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2>
      <span id="modal-title">New Item</span>
      <button class="btn" id="modal-close">&times;</button>
    </h2>
    <input type="hidden" id="edit-id" />
    <label>Title</label>
    <input type="text" id="edit-title" placeholder="Item title..." />
    <label>Description</label>
    <textarea id="edit-desc" placeholder="Full description..."></textarea>
    <div style="display:flex;gap:6px">
      <div style="flex:1">
        <label>Status</label>
        <select id="edit-status"></select>
      </div>
      <div style="flex:1">
        <label>Priority</label>
        <select id="edit-priority">
          <option value="none">none</option>
          <option value="critical">critical</option>
          <option value="high">high</option>
          <option value="medium">medium</option>
          <option value="low">low</option>
        </select>
      </div>
      <div style="flex:1">
        <label>Effort</label>
        <select id="edit-effort">
          <option value="">--</option>
          <option value="XS">XS</option>
          <option value="S">S</option>
          <option value="M">M</option>
          <option value="L">L</option>
          <option value="XL">XL</option>
        </select>
      </div>
    </div>
    <label>Tags (comma-separated)</label>
    <input type="text" id="edit-tags" placeholder="tag1, tag2" />
    <label>Assignee</label>
    <input type="text" id="edit-assignee" placeholder="name" />
    <label>Due Date</label>
    <input type="date" id="edit-due" />
    <div class="modal-actions">
      <button class="btn btn-danger" id="modal-delete" style="display:none">Delete</button>
      <button class="btn" id="modal-cancel">Cancel</button>
      <button class="btn btn-accent" id="modal-save">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="confirm-overlay">
  <div class="modal" style="width:360px;text-align:center">
    <h2 style="justify-content:center" id="confirm-title">Are you sure?</h2>
    <p style="color:var(--text-1);font-size:0.9rem;margin-bottom:18px" id="confirm-msg"></p>
    <div class="modal-actions" style="justify-content:center">
      <button class="btn" id="confirm-cancel">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok">Delete</button>
    </div>
  </div>
</div>

<div class="welcome hidden" id="welcome">
  <div class="welcome-card">
    <div class="welcome-logo">sanban</div>
    <div class="welcome-sub">A lightweight kanban board. Create your first board to get started.</div>
    <form class="welcome-form" id="welcome-form">
      <div class="welcome-field">
        <label>Board name</label>
        <input type="text" id="welcome-board-name" placeholder="e.g. my-project" autofocus />
      </div>
      <button type="submit" class="welcome-create" id="welcome-create">Create board</button>
    </form>
    <div class="welcome-shortcuts">
      <span><kbd>/</kbd> search</span>
      <span><kbd>n</kbd> new item</span>
      <span><kbd>e</kbd> expand</span>
      <span><kbd>Esc</kbd> close</span>
    </div>
  </div>
</div>

<div class="board-modal-overlay" id="board-modal-overlay">
  <div class="board-modal">
    <h2>
      <span>New Board</span>
      <button class="btn" id="board-modal-close">&times;</button>
    </h2>
    <label>Board name</label>
    <input type="text" id="board-name-input" placeholder="e.g. my-project" />
    <div class="board-modal-actions">
      <button class="btn" id="board-modal-cancel">Cancel</button>
      <button class="btn btn-accent" id="board-modal-save">Create</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="shortcuts">
  <kbd>/</kbd> search &nbsp; <kbd>n</kbd> new &nbsp; <kbd>e</kbd> expand &nbsp; <kbd>r</kbd> refresh &nbsp; <kbd>Esc</kbd> close
</div>

<script>
const API = window.location.origin + '/api';
let BOARDS = [];
let CURRENT_BOARD = null;
let ITEMS = [];
let ACTIVE_FILTERS = { priority: new Set(), effort: new Set() };
let SEARCH_Q = '';

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

async function init() {
  try {
    BOARDS = await api('/boards');
  } catch {
    toast('Cannot reach API — run: python -m sanban.server');
    return;
  }
  if (BOARDS.length === 0) {
    document.getElementById('welcome').classList.remove('hidden');
    document.querySelector('.header').style.display = 'none';
    document.querySelector('.board').style.display = 'none';
    setupKeyboard();
    return;
  }
  document.getElementById('welcome').classList.add('hidden');
  document.querySelector('.header').style.display = '';
  document.querySelector('.board').style.display = '';
  renderBoardPicker();
  await selectBoard(BOARDS[0].id);
  setupKeyboard();
}

async function createBoard(name) {
  const board = await api('/boards', { method: 'POST', body: { name } });
  BOARDS.push({ id: board.id, name: board.name, columns: board.columns, item_count: 0 });
  document.getElementById('welcome').classList.add('hidden');
  document.querySelector('.header').style.display = '';
  document.querySelector('.board').style.display = '';
  renderBoardPicker();
  await selectBoard(board.id);
  toast(`Created board "${name}"`);
}

function openBoardModal() {
  document.getElementById('board-name-input').value = '';
  document.getElementById('board-modal-overlay').classList.add('open');
  document.getElementById('board-name-input').focus();
}

function closeBoardModal() {
  document.getElementById('board-modal-overlay').classList.remove('open');
}

document.getElementById('welcome-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = document.getElementById('welcome-board-name').value.trim();
  if (!name) return;
  const btn = document.getElementById('welcome-create');
  btn.disabled = true;
  btn.textContent = 'Creating...';
  try {
    await createBoard(name);
  } catch (err) {
    toast('Failed to create board');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Create board';
  }
});

document.getElementById('board-modal-save').onclick = async () => {
  const name = document.getElementById('board-name-input').value.trim();
  if (!name) { toast('Board name required'); return; }
  closeBoardModal();
  await createBoard(name);
};

document.getElementById('board-modal-close').onclick = closeBoardModal;
document.getElementById('board-modal-cancel').onclick = closeBoardModal;
document.getElementById('board-modal-overlay').onclick = (e) => {
  if (e.target === e.currentTarget) closeBoardModal();
};

document.getElementById('board-name-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('board-modal-save').click();
});

function renderBoardPicker() {
  const picker = document.getElementById('board-picker');
  picker.innerHTML = '';
  for (const b of BOARDS) {
    const opt = document.createElement('option');
    opt.value = b.id;
    opt.textContent = `${b.name} (${b.item_count})`;
    picker.appendChild(opt);
  }
  picker.onchange = () => selectBoard(picker.value);
}

async function selectBoard(boardId) {
  CURRENT_BOARD = await api(`/boards/${boardId}`);
  ITEMS = CURRENT_BOARD.items;
  buildColumns();
  buildFilters();
  render();
  updateStatusSelect();
}

function buildColumns() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  board.style.gridTemplateColumns = CURRENT_BOARD.columns.map(() => '1fr').join(' ');
  for (const col of CURRENT_BOARD.columns) {
    const div = document.createElement('div');
    div.className = 'column';
    div.dataset.col = col;
    div.innerHTML = `
      <div class="column-header">
        <div class="column-title">${col.replace(/_/g, ' ')} <span class="column-count" id="count-${col}">0</span></div>
      </div>
      <div class="card-list" data-status="${col}" id="list-${col}"></div>`;
    board.appendChild(div);
  }
  setupDragDrop();
}

function updateStatusSelect() {
  const sel = document.getElementById('edit-status');
  sel.innerHTML = '';
  for (const col of CURRENT_BOARD.columns) {
    const opt = document.createElement('option');
    opt.value = col;
    opt.textContent = col.replace(/_/g, ' ');
    sel.appendChild(opt);
  }
}

function buildFilters() {
  const groups = {
    priority: ['critical', 'high', 'medium', 'low', 'none'],
    effort: ['XS', 'S', 'M', 'L', 'XL'],
  };
  for (const [key, values] of Object.entries(groups)) {
    const container = document.querySelector(`[data-filter="${key}"]`);
    container.innerHTML = `<span class="filter-label">${key === 'priority' ? 'Pri' : 'Effort'}</span>`;
    for (const v of values) {
      const chip = document.createElement('button');
      chip.className = 'chip';
      chip.textContent = v;
      chip.dataset.value = v;
      chip.addEventListener('click', () => {
        const set = ACTIVE_FILTERS[key];
        set.has(v) ? set.delete(v) : set.add(v);
        chip.classList.toggle('active');
        render();
      });
      container.appendChild(chip);
    }
  }
}

function matchesFilters(item) {
  if (ACTIVE_FILTERS.priority.size && !ACTIVE_FILTERS.priority.has(item.priority)) return false;
  if (ACTIVE_FILTERS.effort.size && !ACTIVE_FILTERS.effort.has(item.effort)) return false;
  if (SEARCH_Q) {
    const hay = `${item.id} ${item.title} ${item.description} ${(item.tags||[]).join(' ')} ${item.assignee}`.toLowerCase();
    if (!hay.includes(SEARCH_Q)) return false;
  }
  return true;
}

function render() {
  const groups = {};
  for (const col of CURRENT_BOARD.columns) groups[col] = [];
  for (const item of ITEMS) {
    item._visible = matchesFilters(item);
    if (item._visible && groups[item.status]) groups[item.status].push(item);
  }
  for (const [status, items] of Object.entries(groups)) {
    const list = document.getElementById(`list-${status}`);
    if (!list) continue;
    list.innerHTML = '';
    for (const item of items) list.appendChild(createCard(item));
    if (!items.length) {
      const empty = document.createElement('div');
      empty.className = 'empty';
      empty.textContent = 'no items';
      list.appendChild(empty);
    }
    const countEl = document.getElementById(`count-${status}`);
    if (countEl) countEl.textContent = items.length;
  }
  updateStats();
}

function createCard(item) {
  const eff = (item.effort || '').toLowerCase();
  const pri = item.priority || 'none';
  const lastCol = CURRENT_BOARD.columns[CURRENT_BOARD.columns.length - 1];
  const isDone = item.status === lastCol;

  const card = document.createElement('div');
  card.className = 'card' + (isDone ? ' done' : '');
  card.draggable = true;
  card.dataset.id = item.id;

  let html = `<button class="card-check" data-action="check" title="Mark as done">&#x2713;</button>`;
  html += `<div class="card-id">${item.id}</div><div class="card-title md-content">${renderMd(item.title)}</div><div class="card-meta">`;
  if (pri !== 'none') html += `<span class="badge badge-pri-${pri}">${pri}</span>`;
  if (item.effort) html += `<span class="badge badge-effort-${eff}">${item.effort}</span>`;
  for (const t of (item.tags || [])) html += `<span class="badge badge-tag">${esc(t)}</span>`;
  if (item.due_date) {
    const isOverdue = item.status !== lastCol && item.due_date && new Date(item.due_date) < new Date(new Date().toDateString());
    html += `<span class="badge badge-due${isOverdue ? ' overdue' : ''}">${item.due_date}${isOverdue ? ' !' : ''}</span>`;
  }
  if (item.assignee) html += `<span class="badge badge-assignee">@${esc(item.assignee)}</span>`;
  html += `</div>`;
  html += `<div class="card-detail">`;
  if (item.description) html += `<div class="detail-section"><div class="detail-label">Description</div><div class="detail-text md-content">${renderMd(item.description)}</div></div>`;
  html += `<div class="detail-section"><div class="detail-label">Meta</div><div class="detail-text">Created: ${item.created_at||'--'}  Updated: ${item.updated_at||'--'}</div></div>`;
  html += `</div>`;
  html += `<div class="card-actions">
    <button class="card-btn card-btn-edit" data-action="edit">Edit</button>
    <button class="card-btn card-btn-delete" data-action="delete">Delete</button>
  </div>`;

  card.innerHTML = html;
  card.addEventListener('click', (e) => {
    if (e.target.closest('.card-actions')) return;
    card.classList.toggle('expanded');
  });
  card.querySelector('[data-action="edit"]').addEventListener('click', (e) => {
    e.stopPropagation();
    openEditModal(item);
  });
  card.querySelector('[data-action="delete"]').addEventListener('click', async (e) => {
    e.stopPropagation();
    if (!await confirmDialog(`Delete ${item.title || item.id}?`)) return;
    await api(`/boards/${CURRENT_BOARD.id}/items/${item.id}`, { method: 'DELETE' });
    ITEMS = ITEMS.filter(i => i.id !== item.id);
    render();
    toast(`Deleted ${item.id}`);
  });
  card.querySelector('[data-action="check"]').addEventListener('click', async (e) => {
    e.stopPropagation();
    if (isDone) return;
    const lastCol = CURRENT_BOARD.columns[CURRENT_BOARD.columns.length - 1];
    await api(`/boards/${CURRENT_BOARD.id}/items/${item.id}`, { method: 'PATCH', body: { status: lastCol } });
    item.status = lastCol;
    render();
    toast(`${item.id} -> done`);
  });
  return card;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function renderMd(text) {
  if (!text) return '';

  // extract fenced code blocks first, before any escaping
  const codeBlocks = [];
  let s = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const highlighted = !lang || lang === 'python' || lang === 'py' ? highlightPython(esc(code)) : esc(code);
    const idx = codeBlocks.length;
    codeBlocks.push(`<pre><code class="language-${lang || 'text'}">${highlighted}</code></pre>`);
    return `%%CODEBLOCK${idx}%%`;
  });

  s = esc(s);
  // inline code (backtick) — must come before bold/italic
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  // bold
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // italic
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // links [text](url)
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  // headings
  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // unordered lists
  s = s.replace(/^(?:- (.+)\n?)+/gm, (block) => {
    const items = block.trim().split('\n').map(l => `<li>${l.replace(/^- /, '')}</li>`).join('');
    return `<ul>${items}</ul>`;
  });
  // line breaks (double newline → paragraph, single → br)
  s = s.replace(/\n\n/g, '</p><p>');
  s = s.replace(/\n/g, '<br>');
  s = `<p>${s}</p>`;
  s = s.replace(/<p><\/p>/g, '');

  // restore code blocks (%% is safe from esc since it has no HTML special chars)
  s = s.replace(/%%CODEBLOCK(\d+)%%/g, (_, i) => codeBlocks[parseInt(i)]);

  return s;
}

function highlightPython(code) {
  // order matters: strings/comments first to avoid inner highlights
  const tokens = [];
  let out = code;

  // strings (triple-quoted, double, single)
  out = out.replace(/("""[\s\S]*?"""|'''[\s\S]*?'''|"[^"\n]*"|'[^'\n]*")/g, (m) => {
    const i = tokens.length;
    tokens.push(`<span class="str">${m}</span>`);
    return `\x01T${i}\x01`;
  });
  // comments
  out = out.replace(/(#.*)$/gm, (m) => {
    const i = tokens.length;
    tokens.push(`<span class="cmt">${m}</span>`);
    return `\x01T${i}\x01`;
  });
  // decorators
  out = out.replace(/(@\w+)/g, (m) => {
    const i = tokens.length;
    tokens.push(`<span class="dec">${m}</span>`);
    return `\x01T${i}\x01`;
  });
  // keywords
  out = out.replace(/\b(def|class|return|if|elif|else|for|while|import|from|as|try|except|finally|with|yield|raise|pass|break|continue|and|or|not|in|is|None|True|False|lambda|global|nonlocal|assert|del|async|await)\b/g, (m) => {
    const i = tokens.length;
    tokens.push(`<span class="kw">${m}</span>`);
    return `\x01T${i}\x01`;
  });
  // function defs
  out = out.replace(/\b(def\s+)(\w+)/g, (m, kw, name) => {
    const i = tokens.length;
    tokens.push(`${kw}<span class="fn">${name}</span>`);
    return `\x01T${i}\x01`;
  });
  // numbers
  out = out.replace(/\b(\d+\.?\d*)\b/g, (m) => {
    const i = tokens.length;
    tokens.push(`<span class="num">${m}</span>`);
    return `\x01T${i}\x01`;
  });

  // restore tokens
  out = out.replace(/\x01T(\d+)\x01/g, (_, i) => tokens[parseInt(i)]);
  return out;
}

function updateStats() {
  const total = ITEMS.length;
  const lastCol = CURRENT_BOARD.columns[CURRENT_BOARD.columns.length - 1];
  const done = ITEMS.filter(i => i.status === lastCol).length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('stats').innerHTML = `
    <span><span class="num">${total}</span> total</span>
    <span><span class="num">${done}</span> done</span>
    <span class="pct">${pct}%</span>`;
}

// ── Drag & Drop ──
function setupDragDrop() {
  document.addEventListener('dragstart', (e) => {
    const card = e.target.closest('.card');
    if (!card) return;
    card.classList.add('dragging');
    e.dataTransfer.setData('text/plain', card.dataset.id);
    e.dataTransfer.effectAllowed = 'move';
  });
  document.addEventListener('dragend', (e) => {
    const card = e.target.closest('.card');
    if (card) card.classList.remove('dragging');
    document.querySelectorAll('.card-list').forEach(el => el.classList.remove('drag-over'));
  });
  document.querySelectorAll('.card-list').forEach(list => {
    list.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; list.classList.add('drag-over'); });
    list.addEventListener('dragleave', () => list.classList.remove('drag-over'));
    list.addEventListener('drop', async (e) => {
      e.preventDefault();
      list.classList.remove('drag-over');
      const id = e.dataTransfer.getData('text/plain');
      const newStatus = list.dataset.status;
      const item = ITEMS.find(i => i.id === id);
      if (item && item.status !== newStatus) {
        await api(`/boards/${CURRENT_BOARD.id}/items/${id}`, { method: 'PATCH', body: { status: newStatus } });
        item.status = newStatus;
        render();
        toast(`${id} -> ${newStatus.replace(/_/g, ' ')}`);
      }
    });
  });
}

// ── Search ──
document.getElementById('search').addEventListener('input', (e) => {
  SEARCH_Q = e.target.value.toLowerCase();
  render();
});

// ── Keyboard ──
function setupKeyboard() {
  const search = document.getElementById('search');
  document.addEventListener('keydown', (e) => {
    const tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') {
      if (e.key === 'Escape') { e.target.blur(); closeModals(); closeBoardModal(); }
      return;
    }
    if (e.key === '/') { e.preventDefault(); search.focus(); }
    if (e.key === 'n') { e.preventDefault(); openNewModal(); }
    if (e.key === 'e') { e.preventDefault(); toggleExpandAll(); }
    if (e.key === 'r') { e.preventDefault(); refreshBoard(); }
  });
}

function toggleExpandAll() {
  const cards = document.querySelectorAll('.card');
  const any = [...cards].some(c => c.classList.contains('expanded'));
  cards.forEach(c => c.classList.toggle('expanded', !any));
}

// ── Modal ──
function openNewModal() {
  document.getElementById('modal-title').textContent = 'New Item';
  document.getElementById('edit-id').value = '';
  document.getElementById('edit-title').value = '';
  document.getElementById('edit-desc').value = '';
  document.getElementById('edit-status').value = CURRENT_BOARD.columns[0];
  document.getElementById('edit-priority').value = 'none';
  document.getElementById('edit-effort').value = '';
  document.getElementById('edit-tags').value = '';
  document.getElementById('edit-assignee').value = '';
  document.getElementById('edit-due').value = '';
  document.getElementById('modal-delete').style.display = 'none';
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('edit-title').focus();
}

function openEditModal(item) {
  document.getElementById('modal-title').textContent = `Edit ${item.id}`;
  document.getElementById('edit-id').value = item.id;
  document.getElementById('edit-title').value = item.title;
  document.getElementById('edit-desc').value = item.description || '';
  document.getElementById('edit-status').value = item.status;
  document.getElementById('edit-priority').value = item.priority || 'none';
  document.getElementById('edit-effort').value = item.effort || '';
  document.getElementById('edit-tags').value = (item.tags || []).join(', ');
  document.getElementById('edit-assignee').value = item.assignee || '';
  document.getElementById('edit-due').value = item.due_date || '';
  document.getElementById('modal-delete').style.display = '';
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('edit-title').focus();
}

function closeModals() { document.getElementById('modal-overlay').classList.remove('open'); }

function confirmDialog(msg) {
  return new Promise(resolve => {
    const overlay = document.getElementById('confirm-overlay');
    document.getElementById('confirm-msg').textContent = msg;
    overlay.classList.add('open');
    const cleanup = (val) => { overlay.classList.remove('open'); resolve(val); };
    document.getElementById('confirm-ok').onclick = () => cleanup(true);
    document.getElementById('confirm-cancel').onclick = () => cleanup(false);
    overlay.onclick = (e) => { if (e.target === e.currentTarget) cleanup(false); };
  });
}

document.getElementById('modal-close').onclick = closeModals;
document.getElementById('modal-cancel').onclick = closeModals;
document.getElementById('modal-overlay').onclick = (e) => { if (e.target === e.currentTarget) closeModals(); };

document.getElementById('modal-save').onclick = async () => {
  const id = document.getElementById('edit-id').value;
  const data = {
    title: document.getElementById('edit-title').value.trim(),
    description: document.getElementById('edit-desc').value.trim(),
    status: document.getElementById('edit-status').value,
    priority: document.getElementById('edit-priority').value,
    effort: document.getElementById('edit-effort').value,
    tags: document.getElementById('edit-tags').value.split(',').map(s => s.trim()).filter(Boolean),
    assignee: document.getElementById('edit-assignee').value.trim(),
    due_date: document.getElementById('edit-due').value,
  };
  if (!data.title) { toast('Title required'); return; }
  if (id) {
    const updated = await api(`/boards/${CURRENT_BOARD.id}/items/${id}`, { method: 'PATCH', body: data });
    const idx = ITEMS.findIndex(i => i.id === id);
    if (idx >= 0) ITEMS[idx] = updated;
    toast(`Updated ${id}`);
  } else {
    const created = await api(`/boards/${CURRENT_BOARD.id}/items`, { method: 'POST', body: data });
    ITEMS.push(created);
    toast(`Created ${created.id}`);
  }
  closeModals();
  render();
};

document.getElementById('modal-delete').onclick = async () => {
  const id = document.getElementById('edit-id').value;
  if (!id || !await confirmDialog(`Delete ${id}?`)) return;
  await api(`/boards/${CURRENT_BOARD.id}/items/${id}`, { method: 'DELETE' });
  ITEMS = ITEMS.filter(i => i.id !== id);
  closeModals();
  render();
  toast(`Deleted ${id}`);
};

// ── Refresh ──
async function refreshBoard() {
  if (!CURRENT_BOARD) return;
  await selectBoard(CURRENT_BOARD.id);
  toast('Board refreshed');
}

// ── New board ──
document.getElementById('btn-new-board').onclick = openBoardModal;

document.getElementById('btn-delete-board').onclick = async () => {
  if (!CURRENT_BOARD) return;
  if (!await confirmDialog(`Delete board "${CURRENT_BOARD.name}"? All items will be lost.`)) return;
  await api(`/boards/${CURRENT_BOARD.id}`, { method: 'DELETE' });
  BOARDS = BOARDS.filter(b => b.id !== CURRENT_BOARD.id);
  CURRENT_BOARD = null;
  ITEMS = [];
  if (BOARDS.length === 0) {
    document.getElementById('welcome').classList.remove('hidden');
    document.querySelector('.header').style.display = 'none';
    document.querySelector('.board').style.display = 'none';
  } else {
    renderBoardPicker();
    await selectBoard(BOARDS[0].id);
  }
  toast('Board deleted');
};

document.getElementById('btn-new').onclick = openNewModal;
document.getElementById('btn-refresh').onclick = refreshBoard;

// ── Toast ──
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 2000);
}

init();
</script>
</body>
</html>
